name: AI Blog Post (semi-auto, PR for review)

# Generates a markdown blog post from the topic queue using the Anthropic API
# and opens a Pull Request for human review. Never commits directly to main.
#
# Schedule: every Monday and Thursday at 00:00 UTC (Korea: 09:00 KST).
# Adjust cron expressions below to change frequency.

on:
  schedule:
    - cron: '0 0 * * 1'   # Mondays 00:00 UTC
    - cron: '0 0 * * 4'   # Thursdays 00:00 UTC
  workflow_dispatch:       # allow manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.js

      - name: Verify build still passes
        run: npm run build

      - name: Create branch + commit
        id: commit
        run: |
          BRANCH="ai-post/${{ steps.generate.outputs.slug }}-$(date +%s)"
          git config user.name "kpoker-bot"
          git config user.email "bot@kpoker.win"
          git checkout -b "$BRANCH"
          git add blog/posts/ scripts/topics/queue.json
          git commit -m "post: ${{ steps.generate.outputs.title }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.commit.outputs.branch }}" \
            --title "AI 초안: ${{ steps.generate.outputs.title }}" \
            --body "$(cat <<'EOF'
          ## 자동 생성된 블로그 글 초안

          큐(`scripts/topics/queue.json`)에서 다음 주제를 꺼내 Anthropic API로 생성했습니다.

          **검토 항목:**
          - [ ] 사실 정확성 (확률, 통계, 핸드 분석 수치)
          - [ ] 한국어 표현 자연스러움
          - [ ] 도박/홍보성 표현이 과하지 않은지
          - [ ] 마크다운 구조 (제목, 표, 인용)
          - [ ] 키워드/카테고리 적절성

          **머지 후:**
          - Cloudflare Pages가 자동 배포 → `https://kpoker.win/blog/${{ steps.generate.outputs.slug }}`
          - Search Console에서 URL Inspection으로 색인 요청

          **수정 필요 시:**
          - PR 브랜치에서 직접 `blog/posts/${{ steps.generate.outputs.filename }}` 편집
          - 또는 PR 닫고 큐에 다시 추가

          🤖 Generated with [Claude](https://www.anthropic.com)
          EOF
          )"
